name: CI

on:
  push:
    branches: [develop, main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc make libcjson-dev clang-format

      - name: Build binary
        run: make lin

      - name: Run tests
        run: make test

      - name: Build shared library
        run: make libchttpx.so

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make

      - name: Build
        run: mingw32-make win SHELL=cmd

      - name: Run tests
        run: mingw32-make win-test-run SHELL=cmd

  static-analysis:
    name: Static analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cppcheck
        run: sudo apt update && sudo apt install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            -I include \
            --error-exitcode=1 \
            src/ include/
