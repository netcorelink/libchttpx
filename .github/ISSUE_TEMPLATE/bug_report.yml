name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - Windows
        - macOS
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: libchttpx version
      description: Tag or commit hash (e.g. v1.5.2)
      placeholder: v1.5.2
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler
      placeholder: gcc 13, MSVC 2022, clang 18, etc.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands to reproduce the issue.
      render: c
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / additional context
      description: Stack traces, HTTP request/response samples, etc.
      render: shell
